name:"Deploying the blog application"

on:
  push:
    branches:["main"]
    path-ignore:
      -README.md
jobs:
     build and push:
        runs-on: ubuntu-latest
        steps:
          -name:Checkout code
           uses:actions/checkout@v7

     deploy to ec2:
        runs-on:ubuntu-latest
        needs:build and push
        steps:
           -name:Deploy to EC2
           uses:appleboy/ssh-action@v1.0.3
            with:
              host : ${{ secrets.EC2_HOST }}
              username: ${{ secrets.EC2_USER }}
              key: ${{ secrets.EC2_KEY }}
              script: |
                cd /home/ubuntu/bloggingWebsite
                git pull origin main
                docker compose down 
                docker compose up -d --build
        
